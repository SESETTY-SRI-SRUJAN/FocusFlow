<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <h2 class="logo">FocusFlow</h2>
            <nav>
                <ul>
                    <li>Dashboard</li>
                    <li>Pomodoro</li>
                    <li>Habits</li>
                    <li>Goals</li>
                    <li>Analytics</li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Welcome Back 👋</h1>

                <button id="theme-toggle">
                    Toggle Theme
                </button>
            </header>
            <section class="stats-container">

                <div class="card">
                    <h3>Study Time</h3>
                    <p>0 hrs</p>
                </div>

                <div class="card">
                    <h3>Sessions</h3>
                    <p id="session-count">0</p>
                </div>

                <div class="card">
                    <h3>Streak</h3>
                    <p>0 Days</p>
                </div>

            </section>
            <section class="pomodoro-section card">
                <h2>Focus Timer</h2>

                <div class="timer" id="timer">
                    25:00
                </div>

                <div class="timer-buttons">
                    <button id="start-btn">Start</button>
                    <button id="pause-btn">Pause</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </section>
            <section class="goals-section card">
                <h2>Daily Goals</h2>

                <input type="text" placeholder="Add a goal">

                <button>Add Goal</button>

                <ul>
                    <li>Complete JavaScript Practice</li>
                </ul>
            </section>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
